<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#EAEEF5" />
  <title>Grupo Roforb — Control Presupuestal</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <!-- Aplica el tema guardado antes de pintar, para evitar un parpadeo del
       tema equivocado. 'system' se resuelve aquí con matchMedia. -->
  <script>
    (function () {
      var p = localStorage.getItem('cp_theme') || 'light';
      if (p === 'system') p = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', p);
    })();
  </script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- Pantalla de login -->
  <div id="loginScreen" class="login-screen">
    <form id="loginForm" class="login-card">
      <img class="login-logo" src="/assets/logo-roforb.png" alt="Grupo Roforb" />
      <h1>Grupo Roforb</h1>
      <p class="muted">Control Presupuestal de Obra — inicia sesión con tu cuenta</p>
      <div class="field"><label>Usuario</label><input id="loginUsuario" autocomplete="username" required /></div>
      <div class="field"><label>Contraseña</label><input id="loginPassword" type="password" autocomplete="current-password" required /></div>
      <div id="loginError" class="alert-box danger" style="display:none"></div>
      <button type="submit" class="btn btn-primary full" id="btnLogin">Entrar</button>
    </form>
  </div>

  <!-- Galería de clientes -->
  <div id="clientGalleryScreen" class="gallery-screen" style="display:none">
    <div class="gallery-card">
      <div class="gallery-header">
        <div class="topbar-brand">
          <img src="/assets/logo-roforb-icon.png" alt="" class="topbar-logo" />
          <strong>Grupo Roforb</strong>
        </div>
        <button id="btnGalleryLogout" class="btn small">Salir</button>
      </div>
      <h1>Selecciona un cliente</h1>
      <p class="muted">Elige el cliente para ver sus presupuestos.</p>
      <div id="clienteGrid" class="cliente-grid"></div>
      <button class="btn btn-primary full" id="btnNuevoClienteGallery" style="display:none;margin-top:16px">+ Nuevo cliente</button>
      <button class="btn full" id="btnCargarContratoGallery" style="display:none;margin-top:8px">📄 Cargar Contrato PDF</button>
      <div id="bienvenidaSummary"></div>
    </div>
  </div>

  <!-- Pantalla de bienvenida -->
  <div id="welcomeScreen" class="welcome-screen" style="display:none">
    <div class="welcome-card">
      <div class="welcome-logo-row">
        <img class="welcome-logo" src="/assets/logo-roforb.png" alt="Grupo Roforb" />
      </div>
      <div class="welcome-greeting">
        <h1 id="welcomeTitle"></h1>
        <p id="welcomeDate" class="muted"></p>
      </div>
      <div id="welcomeProyectos" class="welcome-proyectos"></div>
      <button id="btnWelcomeContinuar" class="btn btn-primary full">Continuar →</button>
    </div>
  </div>

  <div id="app" style="display:none">

    <!-- ── SIDEBAR (navegación principal desktop) ─────────────────────── -->
    <aside id="sidebar" class="sidebar" aria-label="Navegación principal">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <img src="/assets/logo-roforb-icon.png" alt="" class="sidebar-brand-logo" />
          <strong class="sidebar-brand-name">Grupo Roforb</strong>
        </div>
        <button id="btnSidebarCollapse" class="icon-btn sidebar-collapse-btn" aria-label="Colapsar menú"></button>
      </div>

      <button id="btnSidebarProject" class="sidebar-project-btn" aria-label="Cambiar presupuesto">
        <span class="sidebar-project-icon" id="sidebarProjectIcon"></span>
        <span class="sidebar-project-name" id="sidebarProjectName">Sin presupuesto</span>
        <span class="sidebar-project-chevron" id="sidebarProjectChevron"></span>
      </button>

      <nav class="sidebar-nav" id="sidebarNav"></nav>

      <div class="sidebar-footer">
        <button id="btnUserProfile" class="sidebar-profile-btn" aria-label="Perfil de usuario">
          <div class="sidebar-avatar" id="sidebarAvatar"></div>
          <div class="sidebar-profile-info">
            <span class="sidebar-profile-name" id="sidebarProfileName"></span>
            <span class="sidebar-profile-role" id="sidebarProfileRole"></span>
          </div>
          <span class="sidebar-profile-chevron" id="sidebarProfileChevron"></span>
        </button>
      </div>
    </aside>

    <!-- Overlay para cerrar sidebar en móvil -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <!-- Popover de perfil de usuario (desktop) -->
    <div id="userPopover" class="user-popover" style="display:none" role="dialog" aria-label="Perfil">
      <div class="user-popover-info">
        <strong id="popoverName"></strong>
        <span class="muted" id="popoverRole"></span>
      </div>
      <div class="theme-selector" id="themeSelector">
        <button class="theme-opt" data-theme-set="light"><span id="themeIconLight"></span>Claro</button>
        <button class="theme-opt" data-theme-set="dark"><span id="themeIconDark"></span>Oscuro</button>
        <button class="theme-opt" data-theme-set="system"><span id="themeIconSystem"></span>Sistema</button>
      </div>
      <button id="btnMiCuentaPopover" class="btn full" style="margin-bottom:6px">Mi cuenta</button>
      <button id="btnLogoutPopover" class="btn full">Cerrar sesión</button>
    </div>

    <!-- ── ÁREA PRINCIPAL ─────────────────────────────────────────────── -->
    <div class="main-area">
      <header class="topbar">
        <button id="btnMenu" class="icon-btn" aria-label="Menú">☰</button>
        <div class="topbar-title">
          <div class="topbar-brand">
            <img src="/assets/logo-roforb-icon.png" alt="" class="topbar-logo" />
            <strong>Grupo Roforb</strong>
          </div>
          <span id="projectName" class="muted">Selecciona un presupuesto</span>
        </div>
        <button id="btnSync" class="icon-btn" aria-label="Sincronizar" title="Sincronizar datos">↺</button>
        <button id="btnUpload" class="icon-btn" aria-label="Cargar presupuesto" title="Cargar presupuesto">＋</button>
        <div class="notif-wrap">
          <button id="btnNotif" class="icon-btn" aria-label="Notificaciones" title="Notificaciones">🔔</button>
          <span id="notifBadge" class="notif-badge" style="display:none">0</span>
          <div id="notifDropdown" class="notif-dropdown">
            <div class="notif-dropdown-header">
              <strong>Notificaciones</strong>
              <button id="btnMarcarTodasLeidas" class="btn small">Marcar todas como leídas</button>
            </div>
            <div id="notifList" class="notif-list"></div>
          </div>
        </div>
        <button id="btnThemeToggle" class="icon-btn" aria-label="Cambiar tema" title="Cambiar tema claro/oscuro">🌙</button>
        <button id="btnLogout" class="icon-btn" aria-label="Cerrar sesión" title="Cerrar sesión">🚪</button>
      </header>

      <div id="installBanner" class="install-banner" style="display:none">
        <span id="installBannerText" class="install-banner-text"></span>
        <div class="install-banner-actions">
          <button id="btnInstallApp" class="btn small btn-primary">Instalar app</button>
          <button id="btnDismissInstall" class="icon-btn small" aria-label="Cerrar aviso de instalación">✕</button>
        </div>
      </div>

      <nav id="tabs" class="tabs" style="display:none"></nav>

      <main id="view"></main>
    </div>

    <!-- ── BARRA INFERIOR MÓVIL ────────────────────────────────────────── -->
    <nav id="mobileNav" class="mobile-nav" aria-label="Navegación móvil">
      <button class="mobile-nav-item" id="mobileNavResumen">
        <span id="mobileNavResumenIcon"></span>
        <span>Resumen</span>
      </button>
      <button class="mobile-nav-fab" id="btnMobileQuick" aria-label="Acciones rápidas">
        <span id="mobileQuickIcon">+</span>
      </button>
      <div class="mobile-notif-wrap notif-wrap">
        <button class="mobile-nav-item" id="btnMobileNotif">
          <span id="mobileNavNotifIcon"></span>
          <span>Alertas</span>
        </button>
        <span id="notifBadgeMobile" class="notif-badge" style="display:none">0</span>
      </div>
      <button class="mobile-nav-item" id="btnMobileProfile">
        <span id="mobileNavProfileIcon"></span>
        <span>Perfil</span>
      </button>
    </nav>

    <!-- Menú de acciones rápidas (móvil) -->
    <div id="quickActionMenu" class="quick-action-menu" style="display:none">
      <div class="quick-action-backdrop" id="quickActionBackdrop"></div>
      <div class="quick-action-sheet">
        <div class="quick-action-title">Acción rápida</div>
        <div id="quickActionList" class="quick-action-list"></div>
      </div>
    </div>

  </div>

  <!-- Drawer: lista de presupuestos -->
  <div id="drawer" class="drawer">
    <div id="drawerAccount" class="drawer-account"></div>
    <button id="btnVolverClientes" class="btn small full" style="margin-bottom:12px">← Volver a clientes</button>
    <div class="drawer-header">
      <strong>Presupuestos cargados</strong>
      <button id="btnCloseDrawer" class="icon-btn">✕</button>
    </div>
    <div id="projectList" class="project-list"></div>
    <button id="btnUploadDrawer" class="btn btn-primary full">+ Cargar nuevo presupuesto (.xlsx)</button>
  </div>
  <div id="drawerOverlay" class="overlay"></div>

  <!-- Modal genérico -->
  <div id="modalOverlay" class="overlay"></div>
  <div id="modal" class="modal"></div>

  <input type="file" id="fileInput" accept=".xlsx" hidden />
  <input type="file" id="pdfFileInput" accept=".pdf" hidden />

  <div id="toast" class="toast"></div>

  <script src="/vendor/chart.umd.min.js"></script>
  <script src="/vendor/vercel-blob-client.js"></script>
  <script src="/app.js"></script>
</body>
</html>
